<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect for React Router.
      // When a user visits a client-side route directly (e.g. /about),
      // GitHub Pages serves this 404.html. We save the requested path
      // and redirect to the app root so React Router can render it.
      (function () {
        var base = '/Eminent-Insuarance';
        var target = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('spa-redirect', target);
        window.location.replace(base + '/');
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to the site...</p>
  </body>
</html>
